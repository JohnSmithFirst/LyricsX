name: Build and Release LyricsX

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages/checkouts
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('LyricsX.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Cache Carthage Dependencies
        uses: actions/cache@v4
        with:
          path: Carthage
          key: ${{ runner.os }}-carthage-v2-${{ hashFiles('Cartfile.resolved') }}
          restore-keys: |
            ${{ runner.os }}-carthage-

      - name: Install Carthage Dependencies
        run: |
          # Download prebuilt frameworks directly instead of building from source
          mkdir -p Carthage/Build/Mac
          
          # SnapKit 5.7.1
          echo "Downloading SnapKit..."
          curl -sL "https://github.com/SnapKit/SnapKit/releases/download/5.7.1/SnapKit-5.7.1.zip" -o /tmp/snapkit.zip
          unzip -qo /tmp/snapkit.zip -d /tmp/snapkit
          find /tmp/snapkit -name "SnapKit.framework" -type d | head -1 | xargs -I{} cp -R {} Carthage/Build/Mac/
          
          # MASShortcut 2.4.0  
          echo "Downloading MASShortcut..."
          curl -sL "https://github.com/shpakovski/MASShortcut/releases/download/2.4.0/MASShortcut-2.4.0.zip" -o /tmp/mas.zip 2>/dev/null || true
          if [ -f /tmp/mas.zip ] && [ -s /tmp/mas.zip ]; then
            unzip -qo /tmp/mas.zip -d /tmp/mas
            find /tmp/mas -name "MASShortcut.framework" -type d | head -1 | xargs -I{} cp -R {} Carthage/Build/Mac/
          else
            # Build MASShortcut from source if prebuilt not available
            echo "Prebuilt MASShortcut not available, building from source..."
            git clone --depth 1 --branch 2.4.0 https://github.com/shpakovski/MASShortcut.git /tmp/mas-build
            cd /tmp/mas-build
            xcodebuild build -project MASShortcut.xcodeproj -scheme MASShortcut -configuration Release -derivedDataPath build ONLY_ACTIVE_ARCH=YES CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO
            cp -R build/Build/Products/Release/MASShortcut.framework $GITHUB_WORKSPACE/Carthage/Build/Mac/
            cd $GITHUB_WORKSPACE
          fi
          
          echo "Carthage frameworks installed:"
          ls -la Carthage/Build/Mac/
        shell: bash

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project LyricsX.xcodeproj \
            -scheme LyricsX \
            -configuration Release

      - name: Build LyricsX
        run: |
          set -o pipefail
          xcodebuild build \
            -project LyricsX.xcodeproj \
            -scheme LyricsX \
            -configuration Release \
            -derivedDataPath DerivedData \
            -destination "platform=macOS,arch=arm64" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            2>&1 | grep -vE "^(note:|    cd |    builtin-|    /[A-Z]|^$)" | grep --line-buffered -E "(error:|warning:|BUILD|❌|Compiling|Linking|Touch|Process|Copy|Phase)" || true
          
          RESULT=${PIPESTATUS[0]}
          if [ "$RESULT" -ne 0 ]; then
            echo "=== BUILD FAILED - showing errors ==="
            xcodebuild build \
              -project LyricsX.xcodeproj \
              -scheme LyricsX \
              -configuration Release \
              -derivedDataPath DerivedData \
              -destination "platform=macOS,arch=arm64" \
              ONLY_ACTIVE_ARCH=YES \
              CODE_SIGN_IDENTITY="-" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              DEVELOPMENT_TEAM="" \
              2>&1 | grep -E "(error:|❌)" | head -20
            exit 1
          fi
          
          BIN="DerivedData/Build/Products/Release/LyricsX.app/Contents/MacOS/LyricsX"
          if [ ! -f "$BIN" ]; then
            echo "Binary not found at $BIN"
            find DerivedData/Build/Products/Release -name LyricsX -type f 2>/dev/null
            exit 1
          fi
          echo "Binary: $(ls -lh "$BIN" | awk '{print $5}')"
          echo "BUILD SUCCESS"
        shell: bash

      - name: Show errors on failure
        if: failure()
        run: |
          echo "=== ERROR lines from build ==="
          grep -E "(error:|❌)" build.log || echo "No error lines found"
          echo ""
          echo "=== Compilation errors (grep for swift compiler output) ==="
          grep -A5 "CompileSwift\|SwiftCompile\|error:" build.log | tail -200 || echo "No compilation errors found"
          echo ""
          echo "=== First 100 lines of build log (might contain errors) ==="
          head -100 build.log
          echo ""
          echo "=== Last 60 lines before BUILD FAILED ==="
          grep -B60 "BUILD FAILED" build.log | head -60

      - name: Show build log if failed
        if: failure()
        run: |
          echo "=== Build Failed - showing last 100 lines ==="
          tail -100 build.log

      - name: Package App Bundle
        run: |
          echo "Searching for built app..."
          APP_PATH="DerivedData/Build/Products/Release/LyricsX.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: LyricsX.app not found!"
            find DerivedData/Build/Products -maxdepth 3 -type d 2>/dev/null || echo "Nothing found"
            exit 1
          fi
          
          echo "Found: $APP_PATH"
          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "App size: $APP_SIZE"
          
          # Check binary - it may be in Contents/MacOS/ or symlinked
          BINARY="$APP_PATH/Contents/MacOS/LyricsX"
          if [ ! -f "$BINARY" ] && [ ! -L "$BINARY" ]; then
            echo "Binary not found directly, checking for it..."
            find "$APP_PATH/Contents" -type f -perm +111 2>/dev/null | head -5
            # The xcodebuild should have created it, let's check if the build succeeded
            ls -laR "$APP_PATH/Contents/MacOS/" 2>/dev/null
            echo "Binary missing, but app structure exists. Checking xcodebuild result..."
          fi
          
          cp -R "$APP_PATH" ./LyricsX.app
          
          # Verify the binary exists
          if [ ! -f "./LyricsX.app/Contents/MacOS/LyricsX" ]; then
            echo "ERROR: Binary not found in app bundle!"
            ls -la "./LyricsX.app/Contents/MacOS/" 2>/dev/null || echo "No MacOS dir"
            exit 1
          fi
          
          echo "Binary size: $(du -sh ./LyricsX.app/Contents/MacOS/LyricsX | cut -f1)"
          
          # Create ZIP
          ditto -c -k --sequesterRsrc --keepParent LyricsX.app LyricsX.zip
          ZIP_SIZE=$(du -sh LyricsX.zip | cut -f1)
          echo "ZIP size: $ZIP_SIZE"
          echo "Build successful!"
        shell: bash

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricsX
          path: LyricsX.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "LyricsX ${{ github.ref_name }}"
          body: |
            ## LyricsX ${{ github.ref_name }}

            **Compatibility:**
            - macOS 10.14+ (Apple Silicon & Intel)
            - Apple Music, Spotify, Vox, Audirvana, Swinsian

            **This is an automated build from GitHub Actions.**

            ### Installation
            1. Download `LyricsX.zip`
            2. Extract and move `LyricsX.app` to `/Applications`
            3. First launch: Right-click → Open (to bypass Gatekeeper)

            ### Notes
            - This build is not code-signed. macOS may show a security warning on first launch.
            - For signed builds, please download from the [App Store](https://itunes.apple.com/us/app/lyricsx/id1254743014?mt=12) or use Homebrew.
          files: |
            LyricsX.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
