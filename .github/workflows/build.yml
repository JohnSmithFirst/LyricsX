name: Build and Release LyricsX

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Cache SPM Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Developer/Xcode/DerivedData/*/SourcePackages/checkouts
            ~/Library/Caches/org.swift.swiftpm
          key: ${{ runner.os }}-spm-${{ hashFiles('LyricsX.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: |
            ${{ runner.os }}-spm-

      - name: Cache Carthage Dependencies
        uses: actions/cache@v4
        with:
          path: Carthage
          key: ${{ runner.os }}-carthage-v3-${{ hashFiles('Cartfile.resolved') }}

      - name: Resolve SPM Dependencies
        run: |
          xcodebuild -resolvePackageDependencies \
            -project LyricsX.xcodeproj \
            -scheme LyricsX \
            -configuration Release

      - name: Build LyricsX
        run: |
          # Build frameworks and install swiftmodules
          mkdir -p Carthage/Build/Mac
          
          # SnapKit - build framework AND install .swiftmodule for WMO compilation
          if [ ! -d "Carthage/Build/Mac/SnapKit.framework" ]; then
            echo "=== Building SnapKit ==="
            git clone --depth 1 --branch 5.7.1 https://github.com/SnapKit/SnapKit.git /tmp/SnapKit 2>/dev/null
            cd /tmp/SnapKit
            xcodebuild build -project SnapKit.xcodeproj -scheme SnapKit -configuration Release \
              -derivedDataPath /tmp/SnapKit-DD -destination "platform=macOS,arch=arm64" \
              ONLY_ACTIVE_ARCH=YES CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
              DEFINES_MODULE=YES 2>&1 | tail -3
            SNAP_PATH=$(find /tmp/SnapKit-DD -name "SnapKit.framework" -type d | head -1)
            cp -R "$SNAP_PATH" $GITHUB_WORKSPACE/Carthage/Build/Mac/
            # Also copy .swiftmodule to where Xcode can find it
            mkdir -p $GITHUB_WORKSPACE/Carthage/Build/Mac/SnapKit.framework/Modules/SnapKit.swiftmodule
            find /tmp/SnapKit-DD -name "*.swiftmodule" -type f | xargs -I{} cp {} $GITHUB_WORKSPACE/Carthage/Build/Mac/SnapKit.framework/Modules/SnapKit.swiftmodule/ 2>/dev/null
            find /tmp/SnapKit-DD -name "*.swiftdoc" -type f | xargs -I{} cp {} $GITHUB_WORKSPACE/Carthage/Build/Mac/SnapKit.framework/Modules/SnapKit.swiftmodule/ 2>/dev/null
            find /tmp/SnapKit-DD -name "*.swiftsourceinfo" -type f | xargs -I{} cp {} $GITHUB_WORKSPACE/Carthage/Build/Mac/SnapKit.framework/Modules/SnapKit.swiftmodule/ 2>/dev/null
            cd $GITHUB_WORKSPACE
          fi
          
          # MASShortcut (ObjC framework - needs modulemap + headers)
          if [ ! -d "Carthage/Build/Mac/MASShortcut.framework" ]; then
            echo "=== Building MASShortcut ==="
            git clone --depth 1 --branch 2.4.0 https://github.com/shpakovski/MASShortcut.git /tmp/MASShortcut 2>/dev/null
            cd /tmp/MASShortcut
            xcodebuild build -project MASShortcut.xcodeproj -scheme MASShortcut -configuration Release \
              -derivedDataPath /tmp/MAS-DD -destination "platform=macOS,arch=arm64" \
              ONLY_ACTIVE_ARCH=YES CODE_SIGN_IDENTITY="-" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
              DEFINES_MODULE=YES 2>&1 | tail -3
            MAS_PATH=$(find /tmp/MAS-DD -name "MASShortcut.framework" -type d | head -1)
            cp -R "$MAS_PATH" $GITHUB_WORKSPACE/Carthage/Build/Mac/
            
            # Xcode 16's 'build' action doesn't copy public headers into the framework bundle.
            # Copy headers from source and use the project's own modulemap (umbrella header).
            echo "=== Copying MASShortcut headers ==="
            mkdir -p $GITHUB_WORKSPACE/Carthage/Build/Mac/MASShortcut.framework/Headers
            # Find all public .h files from MASShortcut source.
            # Use find -exec to avoid word-splitting on paths with spaces (e.g. "User Defaults Storage").
            find /tmp/MASShortcut/Framework -name "*.h" -type f -exec cp {} $GITHUB_WORKSPACE/Carthage/Build/Mac/MASShortcut.framework/Headers/ \;
            echo "Headers copied:"
            ls $GITHUB_WORKSPACE/Carthage/Build/Mac/MASShortcut.framework/Headers/
            
            # Use MASShortcut's own modulemap (umbrella header style)
            mkdir -p $GITHUB_WORKSPACE/Carthage/Build/Mac/MASShortcut.framework/Modules
            cp /tmp/MASShortcut/Framework/MASShortcut.modulemap \
              $GITHUB_WORKSPACE/Carthage/Build/Mac/MASShortcut.framework/Modules/module.modulemap
            echo "Modulemap:"
            cat $GITHUB_WORKSPACE/Carthage/Build/Mac/MASShortcut.framework/Modules/module.modulemap
            cd $GITHUB_WORKSPACE
          fi
          
          echo "=== Frameworks ==="
          ls -la Carthage/Build/Mac/
          echo "SnapKit modules:"
          find Carthage/Build/Mac/SnapKit.framework/Modules -type f 2>/dev/null | head -10
          
          set -o pipefail
          xcodebuild build \
            -project LyricsX.xcodeproj \
            -scheme LyricsX \
            -configuration Release \
            -derivedDataPath DerivedData \
            -destination "platform=macOS,arch=arm64" \
            ONLY_ACTIVE_ARCH=YES \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
            SWIFT_INCLUDE_PATHS="$(pwd)/Carthage/Build/Mac" \
            2>&1 | tee build.log | grep -E "(error:|BUILD FAILED|BUILD SUCCEEDED|❌|Compiling|Linking|Undefined|ld:)" || true
          
          if grep -q "BUILD FAILED" build.log; then
            echo "=== ERRORS ==="
            grep -E "(error:|❌|Undefined symbols|ld: )" build.log | head -40
            echo "=== LAST 50 LINES ==="
            tail -50 build.log
            exit 1
          fi
          
          BIN="DerivedData/Build/Products/Release/LyricsX.app/Contents/MacOS/LyricsX"
          if [ ! -f "$BIN" ]; then
            echo "Binary not found at $BIN"
            find DerivedData/Build/Products/Release -name LyricsX -type f 2>/dev/null
            exit 1
          fi
          echo "Binary: $(ls -lh "$BIN" | awk '{print $5}')"
          echo "BUILD SUCCESS"
        shell: bash

      - name: Show errors on failure
        if: failure()
        run: |
          echo "=== Errors from build.log ==="
          grep -E "(error:|❌)" build.log 2>/dev/null | head -20 || echo "No errors found"

      - name: Package App Bundle
        run: |
          echo "Searching for built app..."
          APP_PATH="DerivedData/Build/Products/Release/LyricsX.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "ERROR: LyricsX.app not found!"
            find DerivedData/Build/Products -maxdepth 3 -type d 2>/dev/null || echo "Nothing found"
            exit 1
          fi
          
          echo "Found: $APP_PATH"
          APP_SIZE=$(du -sh "$APP_PATH" | cut -f1)
          echo "App size: $APP_SIZE"
          
          # Check binary - it may be in Contents/MacOS/ or symlinked
          BINARY="$APP_PATH/Contents/MacOS/LyricsX"
          if [ ! -f "$BINARY" ] && [ ! -L "$BINARY" ]; then
            echo "Binary not found directly, checking for it..."
            find "$APP_PATH/Contents" -type f -perm +111 2>/dev/null | head -5
            # The xcodebuild should have created it, let's check if the build succeeded
            ls -laR "$APP_PATH/Contents/MacOS/" 2>/dev/null
            echo "Binary missing, but app structure exists. Checking xcodebuild result..."
          fi
          
          cp -R "$APP_PATH" ./LyricsX.app
          
          # Fix versioned framework symlinks (Xcode 16 creates Versions/A/ but not Versions/Current/)
          for fw in ./LyricsX.app/Contents/Frameworks/*.framework; do
            if [ -d "$fw/Versions/A" ] && [ ! -d "$fw/Versions/Current" ]; then
              echo "Fixing symlink: $fw"
              cd "$fw/Versions" && ln -sf A Current && cd - > /dev/null
            fi
          done
          
          # Verify the binary exists
          if [ ! -f "./LyricsX.app/Contents/MacOS/LyricsX" ]; then
            echo "ERROR: Binary not found in app bundle!"
            ls -la "./LyricsX.app/Contents/MacOS/" 2>/dev/null || echo "No MacOS dir"
            exit 1
          fi
          
          echo "Binary size: $(du -sh ./LyricsX.app/Contents/MacOS/LyricsX | cut -f1)"
          
          # Create ZIP
          ditto -c -k --sequesterRsrc --keepParent LyricsX.app LyricsX.zip
          ZIP_SIZE=$(du -sh LyricsX.zip | cut -f1)
          echo "ZIP size: $ZIP_SIZE"
          echo "Build successful!"
        shell: bash

      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: LyricsX
          path: LyricsX.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "LyricsX ${{ github.ref_name }}"
          body: |
            ## LyricsX ${{ github.ref_name }}

            **Compatibility:**
            - macOS 10.14+ (Apple Silicon & Intel)
            - Apple Music, Spotify, Vox, Audirvana, Swinsian

            **This is an automated build from GitHub Actions.**

            ### Installation
            1. Download `LyricsX.zip`
            2. Extract and move `LyricsX.app` to `/Applications`
            3. First launch: Right-click → Open (to bypass Gatekeeper)

            ### Notes
            - This build is not code-signed. macOS may show a security warning on first launch.
            - For signed builds, please download from the [App Store](https://itunes.apple.com/us/app/lyricsx/id1254743014?mt=12) or use Homebrew.
          files: |
            LyricsX.zip
          draft: false
          prerelease: ${{ contains(github.ref_name, 'beta') || contains(github.ref_name, 'alpha') || contains(github.ref_name, 'rc') }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
